<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pakhi Surprise ❤️</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

#start{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
color:#ff66cc;
z-index:10;
}

h1{
font-size:40px;
text-shadow:0 0 15px #ff66cc;
}

button{
margin-top:20px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff3399;
color:white;
cursor:pointer;
}

.love{
position:absolute;
color:#ff66cc;
font-size:30px;
text-shadow:0 0 15px #ff66cc;
white-space:nowrap;
animation:fly linear infinite;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}
</style>
</head>

<body>

<div id="start">
<h1>💖 Pakhi Surprise 💖</h1>
<button onclick="openLove()">🎁 Open Surprise</button>
</div>

<script>
function openLove(){
document.getElementById("start").style.display="none";

for(let i=0;i<40;i++){
let d=document.createElement("div");
d.className="love";
d.innerHTML="❤️ I Love You Moriom ❤️";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(5+Math.random()*5)+"s";
d.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(d);
}
}
</script>

</body>
</html>
