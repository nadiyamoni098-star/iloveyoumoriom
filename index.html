<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Pakhi Surprise 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

#app{
text-align:center;
padding:20px;
}

h1{
color:#ff66cc;
font-size:42px;
text-shadow:0 0 15px #ff66cc;
margin-bottom:20px;
}

p{
font-size:20px;
margin-bottom:25px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff2d55;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<h1>💖 Pakhi Surprise 💖</h1>

<p>শুধু তোমার জন্য একটা ছোট্ট সারপ্রাইজ... 🥹❤️</p>

<button id="startBtn">
🎁 Open Surprise
</button>

</div>

<script>
  const btn = document.getElementById("startBtn");

btn.onclick = function () {
    document.getElementById("app").innerHTML = `
        <h1>🔐 Verifying...</h1>
        <p id="loading">0%</p>
    `;

    let p = 0;

    let t = setInterval(() => {
        p++;

        document.getElementById("loading").innerHTML = p + "%";

        if (p >= 100) {
            clearInterval(t);

            document.getElementById("app").innerHTML = `
                <h1>🥹 Question 1</h1>

                <p>তোমার রিয়েল নাম কী?</p>

                <input id="ans" placeholder="উত্তর লিখো">

                <br><br>

                <button onclick="checkName()">
                Next ❤️
                </button>

                <p id="msg"></p>
            `;
        }

    }, 30);
};

function checkName(){

    let a = document.getElementById("ans").value.trim().toLowerCase();

    if(a=="মরিয়ম" || a=="moriom"){
        document.getElementById("app").innerHTML = `

<button onclick="checkHusband('serajul')">❤️ সেরাজুল</button>

<br><br>

<button onclick="checkHusband('balish')">🛏️ কুলবালিশ</button>

<p id="msg"></p>
`;
    }else{
      document.getElementById("msg").innerHTML="❌ ভুল উত্তর!";
document.getElementById("msg").style.color="red";
}
    }
  function checkHusband(ans){
    if(ans=="serajul"){document.getElementById("app").innerHTML = `
document.getElementById("app").innerHTML = `
<h1>🥰 Question 3</h1>

<p>আমার ডাক নাম কী? 💖</p>

<input type="text" id="piku" placeholder="উত্তর লিখো">

<br><br>

<button onclick="checkPiku()">
Next ❤️
</button>

<p id="msg"></p>
`;

 


      
document.getElementById("app").innerHTML = `

<p>আমাকে কতটা ভালোবাসো? ❤️</p>

<button onclick="alert('💖 আমিও তোমাকে অনেক ভালোবাসি! 💖')">

</button>

<br><br>

<button onclick="alert('😒 ভুল উত্তর!')">
একটু 🤏
</button>
`;
        }
    }else{
        document.getElementById("msg").innerHTML="❌ ভুল উত্তর!";
        document.getElementById("msg").style.color="red";
    }
  }
  function checkPiku(){
    let ans = document.getElementById("piku").value.toLowerCase();

    if(ans=="piku"){
        alert("🥰 একদম ঠিক! ❤️");
    }else{
        document.getElementById("msg").innerHTML = "❌ ভুল উত্তর, আবার চেষ্টা করো!";
        document.getElementById("msg").style.color = "red";
    }
  }
    </script>
</body>
</html>
