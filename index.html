<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love For Moriom ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle,#1a0033,#000);
font-family:Arial,sans-serif;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

#welcome,#love{
position:relative;
z-index:2;
text-align:center;
color:#fff;
}

#love{
display:none;
}

h1{
font-size:48px;
color:#ff66cc;
text-shadow:0 0 15px #ff66cc,0 0 35px #ff1493;
}

p{
margin:20px 0;
font-size:22px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff2d55;
color:#fff;
cursor:pointer;
box-shadow:0 0 20px #ff2d55;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="welcome">
<h1>💖 Pakhi 💖</h1>
<p>Eta shudhu tmr jonno... ❤️</p>

<button onclick="startLove()">
⭐ Get Started
</button>

</div>

<div id="love">

<h1>
💖<br>
𝐈 𝐋𝐨𝐯𝐞 𝐘𝐨𝐮<br>
𝐌𝐨𝐫𝐢𝐨𝐦
</h1>

</div>

<script>

function startLove(){
document.getElementById("welcome").style.display="none";
document.getElementById("love").style.display="block";
}const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const stars=[];

for(let i=0;i<180;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
s:Math.random()*1.5+0.3
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fill();

star.y+=star.s;

if(star.y>canvas.height){
star.y=0;
star.x=Math.random()*canvas.width;
}
});

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
