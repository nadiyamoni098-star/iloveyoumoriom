<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pakhi ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
height:100vh;
font-family:sans-serif;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#fff;
font-size:30px;
text-align:center;
animation:blink 1s infinite;
text-shadow:0 0 15px #ff66cc;
}

@keyframes blink{
50%{opacity:.3;}
}

.item{
position:absolute;
font-size:24px;
font-weight:bold;
font-style:italic;
white-space:nowrap;
animation:fall linear forwards;
text-shadow:0 0 12px currentColor;
}

@keyframes fall{
0%{
transform:translateY(-120px) rotate(-25deg) scale(.6);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:translateY(110vh) rotate(25deg) scale(1.2);
opacity:1;
}
}
</style>
</head>

<body>

<div id="loading">
𝐏𝐚𝐤𝐡𝐢 𝐄𝐭𝐚 𝐓𝐦𝐫 𝐉𝐨𝐧𝐧𝐨! 🥺❤️‍🩹
</div>

<script>

setTimeout(()=>{

loading.remove();

let list=[
"🌸 I Love You Moriom 🌸",
"✨ I Love You Moriom ✨",
"🫶 I Love You Moriom 🫶",
"🎀 I Love You Moriom 🎀",
"🌷 I Love You Moriom 🌷",
"🦋 I Love You Moriom 🦋",
"👑 Moriom 👑",
"💍 Forever",
"🥹",
"✨",
"🌸",
"🎀"
];

setInterval(()=>{

for(let i=0;i<8;i++){

let d=document.createElement("div");
d.className="item";

d.innerHTML=list[Math.floor(Math.random()*list.length)];

d.style.left=Math.random()*95+"vw";

let colors=["#ff66cc","#00e5ff","#ffd700","#ffffff","#c77dff"];

d.style.color=colors[Math.floor(Math.random()*colors.length)];

d.style.fontSize=(20+Math.random()*12)+"px";

d.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(d);

setTimeout(()=>d.remove(),8000);

}

},400);

},3000);

</script>

</body>
</html>
